name: Actions Release

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-slim

    strategy:
      fail-fast: false
      matrix:
        node-version: [16.x]
        action: [
            can-i-deploy,
            create-version-tag,
            publish-pact-files,
            publish-provider-contract,
            record-deployment,
            record-release,
            create-or-update-version,
          ]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Use Node.js 16.x for ${{ matrix.action }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: ${{ matrix.action }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.action }}
      - run: npm run test:unit
        name: test ${{ matrix.action }}
        working-directory: ${{ matrix.action }}

  release:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - uses: K-Phoen/semver-release-action@1a1fc63a95a12b4bb535b53ab0d861bce53ce89d # master
        with:
          release_branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
